name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deployment is handled automatically by Coolify via Git sync
# This workflow runs CI checks to verify the build before deployment

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
            